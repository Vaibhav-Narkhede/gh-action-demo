name: Secret Action Example
on:
  workflow_dispatch:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Use secret safely
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "The API Token is available to this step"
          echo "Token length: ${#API_TOKEN}"
          echo "Token : ${API_TOKEN}"
